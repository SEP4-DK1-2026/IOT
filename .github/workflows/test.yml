name: Run C Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compile RainGauge tests
        run: |
          gcc -o RainGaugeTest \
          test/RainGaugeTest.c \
          lib/drivers/weathermath.c \
          lib/drivers/unity.c \
          -Ilib/drivers -Isrc -lm

      - name: Compile WindSpeed tests
        run: |
          gcc -o WindSpeedTest \
          test/WindSpeedTest.c \
          lib/drivers/weathermath.c \
          lib/drivers/unity.c \
          -Ilib/drivers -Isrc -lm

      - name: Run RainGauge tests
        run: ./RainGaugeTest

      - name: Run WindSpeed tests
        run: ./WindSpeedTest